name: Build Android Native APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Setup Gradle Environment
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: '8.5'

    - name: Inject Secure Gemini API Key
      run: |
        sed -i "s#_SECURE_GEMINI_KEY_#${{ secrets.GEMINI_API_KEY }}#g" app/src/main/java/com/caraidiag/app/MainActivity.kt

    - name: Build APK with Gradle
      run: gradle assembleDebug

    - name: Upload Finished APK
      uses: actions/upload-artifact@v4
      with:
        name: CarAIDiag-Native-APK
        path: app/build/outputs/apk/debug/app-debug.apk
